name: Update Repo Data and README

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  push:
    branches: [ main ]
  workflow_dispatch: # Allow manual triggering

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push changes back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Generate repos.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x generate-repos.sh
          ./generate-repos.sh

      - name: Update README.md
        run: python update_readme.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add repos.json README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto-update repos.json and README.md" && git push)
